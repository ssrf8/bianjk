services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "28473:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    expose:
      - "8080"
    restart: unless-stopped
